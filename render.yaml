services:
  - type: web
    name: serpmantics-worker
    runtime: node
    repo: https://github.com/neaskol/serpmantic
    region: frankfurt
    plan: free
    branch: main
    rootDir: services/worker
    buildCommand: npm install && npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: NLP_SERVICE_URL
        value: https://serpmantic-nlp.onrender.com
